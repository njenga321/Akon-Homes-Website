kind = "web"
previewPath = "/"
title = "Akon Homes"
version = "1.0.0"
id = "artifacts/akon-homes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21943

[services.development]
run = "pnpm --filter @workspace/akon-homes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/akon-homes", "run", "build" ]
publicDir = "artifacts/akon-homes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21943"
BASE_PATH = "/"
